<!DOCTYPE html>
<!--
  INSTRUCTIONS :
  1. Ouvre ce fichier dans Chrome
  2. Clique "Télécharger icon-192" puis "Télécharger icon-512"
  3. Déplace les fichiers téléchargés dans ce dossier (public/icons/)
-->
<html>
<head><title>Générer icônes Horus</title></head>
<body style="font-family:sans-serif; padding:20px; background:#0f172a; color:#fff;">
  <h2>Générateur d'icônes Horus PWA</h2>
  <canvas id="c192" width="192" height="192" style="display:none"></canvas>
  <canvas id="c512" width="512" height="512" style="display:none"></canvas>
  <div style="display:flex; gap:20px; margin:20px 0; align-items:flex-start;">
    <div>
      <canvas id="preview192" width="192" height="192" style="border-radius:12px"></canvas>
      <br/>
      <button onclick="download(192)" style="margin-top:8px; padding:8px 16px; background:#f59e0b; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">
        Télécharger icon-192.png
      </button>
    </div>
    <div>
      <canvas id="preview512" width="512" height="512" style="border-radius:24px; width:128px; height:128px"></canvas>
      <br/>
      <button onclick="download(512)" style="margin-top:8px; padding:8px 16px; background:#f59e0b; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">
        Télécharger icon-512.png
      </button>
    </div>
  </div>
  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const r = size * 0.12;
      // Fond
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, r);
      ctx.fill();
      // Soleil (cercle central)
      const cx = size / 2, cy = size / 2;
      const sunR = size * 0.22;
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.arc(cx, cy, sunR, 0, Math.PI * 2);
      ctx.fill();
      // Rayons
      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = size * 0.05;
      ctx.lineCap = 'round';
      for (let i = 0; i < 8; i++) {
        const angle = (i * Math.PI * 2) / 8;
        const x1 = cx + Math.cos(angle) * (sunR + size * 0.05);
        const y1 = cy + Math.sin(angle) * (sunR + size * 0.05);
        const x2 = cx + Math.cos(angle) * (sunR + size * 0.18);
        const y2 = cy + Math.sin(angle) * (sunR + size * 0.18);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
      // Texte "H"
      ctx.fillStyle = '#0f172a';
      ctx.font = `bold ${size * 0.28}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('H', cx, cy + size * 0.01);
    }
    // Dessine sur les previews
    drawIcon(document.getElementById('preview192'), 192);
    drawIcon(document.getElementById('preview512'), 512);

    function download(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      drawIcon(canvas, size);
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
